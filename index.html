<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOOKTAB</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #ffffff; color: #000000; padding: 12px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .wiki-wrapper { width: 100%; max-width: 420px; margin-top: 5vh; }

        /* ADMIN BAR */
        .secret-admin-bar { width: 100%; background-color: #f8f9fa; border: 2px dashed #3366cc; padding: 10px; margin-bottom: 15px; display: none; justify-content: space-between; align-items: center; border-radius: 4px; }
        .btn-action { background-color: #ffffff; color: #3366cc; border: 1px solid #a2a9b1; padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 2px; }
        .btn-action:hover { background-color: #f8f9fa; border-color: #3366cc; }
        .btn-danger { color: #d33; }
        .btn-danger:hover { background-color: #fff5f5; border-color: #d33; }

        /* SEARCH VIEW */
        .search-view { display: block; width: 100%; text-align: center; }
        .brand-header { margin-bottom: 24px; }
        .brand-title { font-family: 'Georgia', serif; font-size: 2.6rem; color: #000000; letter-spacing: 0.5px; }
        .brand-subtitle { font-size: 11px; color: #202122; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }

        /* SEARCH BOX */
        .search-box-frame { position: relative; display: flex; width: 100%; border: 1px solid #a2a9b1; background-color: #ffffff; border-radius: 2px; }
        .globe-box { background-color: #f8f9fa; border-right: 1px solid #a2a9b1; width: 46px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .input-field { flex: 1; padding: 12px; font-size: 16px; border: none; background: transparent; color: #000000; outline: none; }
        .search-icon-button { background-color: #3366cc; border: none; width: 46px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .dropdown-suggestions { position: absolute; top: 100%; left: -1px; right: -1px; background-color: #ffffff; border: 1px solid #a2a9b1; border-top: none; max-height: 340px; overflow-y: auto; z-index: 99; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .box-row-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eaecf0; cursor: pointer; text-align: left; }
        .box-row-item:hover { background-color: #f8f9fa; }
        .row-thumb-frame { width: 46px; height: 46px; object-fit: cover; margin-right: 12px; border: 1px solid #c8ccd1; background-color: #f8f9fa; }
        .row-text-meta h4 { font-size: 15px; color: #3366cc; font-weight: 600; }
        .row-text-meta p { font-size: 12px; color: #202122; margin-top: 2px; }

        /* SPINNING GLOBE */
        @keyframes globeRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .globe-svg { width: 30px; height: 30px; }
        .globe-spin { animation: globeRotate 5s linear infinite; transform-origin: 50% 50%; }

        /* DETAIL CARD */
        .detail-infocard-view { display: none; width: 100%; background-color: #f8f9fa; border: 1px solid #a2a9b1; }
        .nav-header-row { padding: 8px 0; background-color: #ffffff; width: 100%; display: none; text-align: left; }
        .back-link-btn { background: none; border: none; color: #3366cc; font-size: 14px; cursor: pointer; font-weight: bold; }
        .card-main-title { background-color: #eaecf0; padding: 12px; text-align: center; font-size: 19px; font-weight: 500; border-bottom: 1px solid #a2a9b1; color: #3366cc; }

        /* CAROUSEL */
        .card-image-box { padding: 16px; text-align: center; position: relative; }
        .carousel-wrapper { position: relative; display: inline-block; width: 100%; }
        .card-img-element { max-width: 100%; max-height: 290px; object-fit: contain; display: block; margin: 0 auto; background-color: #ffffff; border: 1px solid #c8ccd1; width: 100%; }
        .carousel-arrow { display: none; position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.45); color: #fff; border: none; width: 30px; height: 52px; font-size: 22px; cursor: pointer; z-index: 10; border-radius: 2px; line-height: 52px; text-align: center; padding: 0; user-select: none; }
        .carousel-arrow.left { left: 0; }
        .carousel-arrow.right { right: 0; }
        .carousel-dots { margin-top: 8px; display: flex; justify-content: center; gap: 6px; min-height: 14px; }
        .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: #c8ccd1; cursor: pointer; border: none; padding: 0; }
        .carousel-dot.active { background: #3366cc; }
        .photo-upload-trigger { display: none; background-color: rgba(255,255,255,0.95); color: #3366cc; border: 1px dashed #3366cc; padding: 6px 12px; font-size: 12px; font-weight: bold; margin-top: 8px; cursor: pointer; border-radius: 2px; }
        .card-img-caption { font-size: 12px; color: #000000; margin-top: 8px; text-align: center; }

        /* DATA ROWS */
        .card-data-row { display: flex; width: 100%; border-top: 1px solid #a2a9b1; font-size: 13px; position: relative; }
        .card-cell-label { width: 35%; background-color: #eaecf0; padding: 10px; font-weight: bold; color: #000000; border-right: 1px solid #a2a9b1; }
        .card-cell-value { width: 65%; padding: 10px; color: #000000; line-height: 1.4; padding-right: 30px; }
        .delete-row-icon { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #d33; cursor: pointer; font-weight: bold; font-size: 14px; padding: 2px 5px; }

        /* DESCRIPTION ROW (hidden by default, shown on button click) */
        .desc-row { display: none; flex-direction: column; width: 100%; border-top: 1px solid #a2a9b1; font-size: 13px; }
        .desc-row.visible { display: flex; }
        .desc-label { background-color: #eaecf0; padding: 8px 10px; font-weight: bold; font-size: 12px; color: #000; border-bottom: 1px solid #a2a9b1; }
        .desc-textarea { width: 100%; min-height: 90px; padding: 10px; font-size: 13px; color: #000; background: #fff; border: none; outline: none; resize: vertical; font-family: inherit; line-height: 1.5; }
        .desc-textarea[contenteditable="false"] { background: #f8f9fa; cursor: default; }

        /* BOTTOM ACTION ROW */
        .bottom-action-row { padding: 10px 12px; background-color: #eaecf0; border-top: 1px solid #a2a9b1; display: none; gap: 8px; flex-wrap: wrap; }
        .bottom-action-row.visible { display: flex; }

        [contenteditable="true"] { outline: 1px dashed #3366cc !important; background-color: rgba(51,102,204,0.06); }

        /* MODALS SHARED */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #ffffff; border: 1px solid #a2a9b1; border-radius: 4px; width: 92%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .modal-header { background-color: #eaecf0; border-bottom: 1px solid #a2a9b1; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 16px; color: #3366cc; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 20px; color: #555; cursor: pointer; }
        .modal-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .modal-field label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 4px; }
        .modal-field input, .modal-field textarea { width: 100%; border: 1px solid #a2a9b1; border-radius: 2px; padding: 9px 10px; font-size: 14px; color: #000; background: #fff; outline: none; font-family: inherit; }
        .modal-field input:focus, .modal-field textarea:focus { border-color: #3366cc; }
        .modal-field textarea { resize: vertical; min-height: 80px; }
        .modal-row-fields { border: 1px solid #eaecf0; border-radius: 2px; padding: 10px; background: #f8f9fa; }
        .modal-row-fields label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 6px; display: block; }
        .modal-row-entry { display: flex; gap: 6px; margin-bottom: 6px; }
        .modal-row-entry input { flex: 1; border: 1px solid #a2a9b1; border-radius: 2px; padding: 6px 8px; font-size: 13px; }
        .modal-row-add-btn { background: none; border: 1px dashed #3366cc; color: #3366cc; font-size: 12px; padding: 5px 10px; cursor: pointer; border-radius: 2px; width: 100%; margin-top: 4px; }
        .modal-footer { padding: 12px 16px; border-top: 1px solid #eaecf0; display: flex; gap: 8px; justify-content: flex-end; }
        .modal-btn-create { background: #3366cc; color: #fff; border: none; padding: 9px 20px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 2px; }
        .modal-btn-cancel { background: #fff; color: #555; border: 1px solid #a2a9b1; padding: 9px 16px; font-size: 14px; cursor: pointer; border-radius: 2px; }

        /* DATA OVERVIEW PANEL */
        .overview-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .stat-badge { background: #e8f0fe; border: 1px solid #c5d4f5; border-radius: 16px; padding: 4px 12px; font-size: 12px; color: #3366cc; font-weight: bold; }
        .overview-search { width: 100%; border: 1px solid #a2a9b1; border-radius: 2px; padding: 8px 10px; font-size: 14px; margin-bottom: 10px; outline: none; }
        .overview-search:focus { border-color: #3366cc; }
        .overview-list { max-height: 320px; overflow-y: auto; border: 1px solid #eaecf0; border-radius: 2px; }
        .overview-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .overview-item:hover { background: #f8f9fa; }
        .overview-item-info { flex: 1; }
        .overview-item-name { font-size: 14px; font-weight: 600; color: #3366cc; }
        .overview-item-type { font-size: 11px; color: #777; margin-top: 1px; }
        .overview-item-del { background: none; border: 1px solid #d33; color: #d33; font-size: 11px; padding: 3px 8px; cursor: pointer; border-radius: 2px; margin-left: 8px; flex-shrink: 0; }
        .overview-item-del:hover { background: #fff0f0; }
        .overview-source-tag { font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 6px; }
        .tag-json { background: #e3f2fd; color: #1565c0; }
        .tag-manual { background: #e8f5e9; color: #2e7d32; }
        .tag-info { background: #fff3e0; color: #e65100; }

        /* ADD INFORMATION CARD STYLE */
        .info-card-preview { border: 1px solid #a2a9b1; border-radius: 4px; overflow: hidden; margin-top: 6px; }
        .info-card-img-area { background: #f0f4ff; height: 120px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #dde; cursor: pointer; position: relative; overflow: hidden; }
        .info-card-img-area img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .info-card-img-placeholder { color: #aaa; font-size: 13px; text-align: center; }
        .info-card-img-area.has-img .info-card-img-placeholder { display: none; }
        .info-card-img-area.has-img img { display: block; }
        .info-card-body { padding: 10px; }
        .info-card-title-input { width: 100%; font-size: 16px; font-weight: bold; border: none; border-bottom: 1px dashed #aaa; padding: 4px 0; margin-bottom: 8px; outline: none; color: #3366cc; background: transparent; }
        .info-card-text-area { width: 100%; min-height: 80px; border: 1px dashed #ccc; padding: 8px; font-size: 13px; border-radius: 2px; resize: vertical; font-family: inherit; outline: none; background: #fafafa; }
        .info-card-text-area:focus { border-color: #3366cc; background: #fff; }
    </style>
</head>
<body>
<div class="wiki-wrapper">

    <div class="secret-admin-bar" id="secretAdminBar">
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn-action" onclick="openCreateModal()">+ Create Article</button>
            <button class="btn-action" style="background:#e8f0fe;" onclick="openDataOverview()">📊 Data Overview</button>
            <button class="btn-action" style="background:#e8ffe8;color:#1a7a1a;" onclick="openAddInfoModal()">➕ Add Information</button>
        </div>
        <span style="color:#3366cc;font-size:11px;font-weight:bold;white-space:nowrap;">⚡ EDIT MODE</span>
        <button class="btn-action btn-danger" id="deleteArticleBtn" onclick="deleteCurrentArticle()" style="display:none;">🗑 Delete</button>
    </div>

    <div class="nav-header-row" id="navHeader">
        <button class="back-link-btn" onclick="resetToSearchView()">← Back to Search</button>
    </div>

    <!-- SEARCH VIEW -->
    <div class="search-view" id="searchView">
        <div class="brand-header">
            <div class="brand-title">BOOKTAB</div>
            <div class="brand-subtitle">The All Create World Information</div>
        </div>
        <div class="search-box-frame">
            <!-- SPINNING GLOBE -->
            <div class="globe-box">
                <svg class="globe-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <clipPath id="globeClip"><circle cx="50" cy="50" r="46"/></clipPath>
                    <radialGradient id="oceanGrad" cx="40%" cy="35%">
                      <stop offset="0%" stop-color="#5b9bd5"/>
                      <stop offset="100%" stop-color="#1a5fa8"/>
                    </radialGradient>
                    <radialGradient id="globeShine" cx="35%" cy="30%">
                      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
                      <stop offset="60%" stop-color="white" stop-opacity="0"/>
                    </radialGradient>
                  </defs>
                  <!-- Ocean base -->
                  <circle cx="50" cy="50" r="46" fill="url(#oceanGrad)"/>
                  <!-- Spinning land group -->
                  <g class="globe-spin" clip-path="url(#globeClip)">
                    <!-- Latitude grid lines -->
                    <line x1="4" y1="50" x2="96" y2="50" stroke="#4a8fc4" stroke-width="0.6" stroke-opacity="0.5"/>
                    <ellipse cx="50" cy="50" rx="46" ry="15" fill="none" stroke="#4a8fc4" stroke-width="0.5" stroke-opacity="0.4"/>
                    <ellipse cx="50" cy="50" rx="46" ry="30" fill="none" stroke="#4a8fc4" stroke-width="0.5" stroke-opacity="0.3"/>
                    <!-- Meridian lines -->
                    <ellipse cx="50" cy="50" rx="12" ry="46" fill="none" stroke="#4a8fc4" stroke-width="0.5" stroke-opacity="0.4"/>
                    <ellipse cx="50" cy="50" rx="28" ry="46" fill="none" stroke="#4a8fc4" stroke-width="0.5" stroke-opacity="0.4"/>
                    <!-- Continent 1: Europe/Africa shape -->
                    <path d="M44,18 L48,16 L53,18 L55,22 L54,27 L56,30 L55,35 L52,38 L50,44 L48,50 L46,55 L44,60 L42,65 L40,62 L39,57 L41,52 L40,47 L38,42 L37,36 L38,30 L40,25 Z" fill="#3a9e5f" opacity="0.9"/>
                    <!-- Continent 2: Americas -->
                    <path d="M18,22 L22,20 L26,22 L28,26 L27,32 L25,36 L24,42 L22,48 L20,54 L18,58 L16,54 L15,48 L16,42 L15,36 L14,30 L15,25 Z" fill="#2d8a50" opacity="0.9"/>
                    <path d="M20,60 L24,58 L26,62 L25,68 L22,73 L19,75 L17,72 L16,67 L17,62 Z" fill="#2d8a50" opacity="0.85"/>
                    <!-- Continent 3: Asia -->
                    <path d="M58,16 L65,14 L72,16 L78,20 L80,26 L78,30 L72,32 L68,35 L62,34 L57,30 L55,25 L57,20 Z" fill="#3aad68" opacity="0.9"/>
                    <path d="M64,34 L70,33 L76,36 L78,42 L75,46 L70,48 L64,46 L61,42 L62,37 Z" fill="#3aad68" opacity="0.85"/>
                    <!-- Continent 4: Australia -->
                    <path d="M72,60 L78,58 L82,62 L81,68 L77,71 L72,70 L69,66 L70,61 Z" fill="#4ab87a" opacity="0.8"/>
                    <!-- Antarctica hint -->
                    <ellipse cx="50" cy="90" rx="30" ry="8" fill="#dff0ff" opacity="0.6"/>
                  </g>
                  <!-- Shine overlay -->
                  <circle cx="50" cy="50" r="46" fill="url(#globeShine)"/>
                  <!-- Outer border -->
                  <circle cx="50" cy="50" r="46" fill="none" stroke="#1a5fa8" stroke-width="2"/>
                </svg>
            </div>
            <input type="text" class="input-field" id="mainSearchInput" placeholder="Search articles..." autocomplete="off">
            <button class="search-icon-button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <div class="dropdown-suggestions" id="dropdownSuggestions"></div>
        </div>
    </div>

    <!-- DETAIL CARD -->
    <div class="detail-infocard-view" id="detailInfocardView">
        <div class="card-main-title" id="cardTitleHolder" contenteditable="false" onblur="updateTextData('title',this)">Title</div>

        <div class="card-image-box">
            <div class="carousel-wrapper">
                <button class="carousel-arrow left"  id="arrowLeft"  onclick="carouselMove(-1)">&#8249;</button>
                <img src="" class="card-img-element" id="cardImageHolder">
                <button class="carousel-arrow right" id="arrowRight" onclick="carouselMove(1)">&#8250;</button>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
            <div id="photoUploadTrigger" class="photo-upload-trigger" onclick="document.getElementById('galleryFileInput').click()">📷 Add Photo</div>
            <div class="card-img-caption" id="cardCaptionHolder" contenteditable="false" onblur="updateTextData('caption',this)">Caption</div>
        </div>
        <input type="file" id="galleryFileInput" accept="image/*" multiple style="position:fixed;top:-9999px;left:-9999px;" onchange="processLocalImage(event)">

        <div id="cardRowsContainer"></div>

        <!-- BOTTOM ACTIONS: Add Row + Add Description (side by side) -->
        <div class="bottom-action-row" id="bottomActionRow">
            <button class="btn-action" onclick="addNewInfoRow()">+ Add Row</button>
            <button class="btn-action" id="addDescBtn" onclick="toggleDescription()">+ Add Description</button>
        </div>

        <!-- DESCRIPTION ROW — always last, hidden until clicked or notes exist -->
        <div class="desc-row" id="descRow">
            <div class="desc-label">📝 Description</div>
            <div class="desc-textarea" id="descTextarea" contenteditable="false" onblur="updateTextData('notes',this)"></div>
        </div>
    </div>

</div>

<!-- CREATE ARTICLE MODAL -->
<div class="modal-overlay" id="createModal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>✏️ Naya Article Banayein</h3>
            <button class="modal-close" onclick="closeCreateModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-field">
                <label>Article Title *</label>
                <input type="text" id="mTitle" placeholder="e.g. India, My Profile, London...">
            </div>
            <div class="modal-field">
                <label>Subtitle / Short Description</label>
                <input type="text" id="mSubtitle" placeholder="e.g. Country in South Asia">
            </div>
            <div class="modal-row-fields">
                <label>Info Rows (Label → Value)</label>
                <div id="modalRowsContainer">
                    <div class="modal-row-entry">
                        <input type="text" placeholder="Label" class="mRowLabel">
                        <input type="text" placeholder="Value" class="mRowValue">
                    </div>
                </div>
                <button class="modal-row-add-btn" onclick="addModalRow()">+ Row Add Karo</button>
            </div>
        </div>
        <div class="modal-footer">
            <button class="modal-btn-cancel" onclick="closeCreateModal()">Cancel</button>
            <button class="modal-btn-create" onclick="submitCreateArticle()">✓ Article Banao</button>
        </div>
    </div>
</div>

<!-- DATA OVERVIEW MODAL -->
<div class="modal-overlay" id="dataOverviewModal">
    <div class="modal-box" style="max-width:440px;">
        <div class="modal-header">
            <h3>📊 Data Overview</h3>
            <button class="modal-close" onclick="closeDataOverview()">✕</button>
        </div>
        <div class="modal-body" style="gap:8px;">
            <div class="overview-stats" id="overviewStats"></div>
            <input type="text" class="overview-search" id="overviewSearchInput" placeholder="🔍 Name se dhundho..." oninput="filterOverviewList(this.value)">
            <div class="overview-list" id="overviewList"></div>
        </div>
        <div class="modal-footer">
            <button class="modal-btn-cancel" onclick="closeDataOverview()">Close</button>
        </div>
    </div>
</div>

<!-- ADD INFORMATION MODAL -->
<div class="modal-overlay" id="addInfoModal">
    <div class="modal-box" style="max-width:420px;">
        <div class="modal-header">
            <h3>➕ Add Information</h3>
            <button class="modal-close" onclick="closeAddInfoModal()">✕</button>
        </div>
        <div class="modal-body">
            <p style="font-size:12px;color:#555;background:#fffbe6;border:1px solid #ffe58f;padding:8px;border-radius:3px;">
                Yahan apna custom information card banao — photo + title + description. Alag style mein dikhega.
            </p>
            <div class="info-card-preview">
                <div class="info-card-img-area" id="infoImgArea" onclick="document.getElementById('infoImgInput').click()">
                    <img id="infoImgPreview" src="" alt="">
                    <div class="info-card-img-placeholder">📷 Tap to add photo<br><span style="font-size:11px;">(optional)</span></div>
                </div>
                <div class="info-card-body">
                    <input type="text" class="info-card-title-input" id="infoCardTitle" placeholder="Title likhein...">
                    <textarea class="info-card-text-area" id="infoCardText" placeholder="Koi bhi information, notes, details yahan likhein..."></textarea>
                </div>
            </div>
            <input type="file" id="infoImgInput" accept="image/*" style="position:fixed;top:-9999px;" onchange="previewInfoImg(event)">
        </div>
        <div class="modal-footer">
            <button class="modal-btn-cancel" onclick="closeAddInfoModal()">Cancel</button>
            <button class="modal-btn-create" style="background:#1a7a1a;" onclick="submitAddInfo()">✓ Add Karo</button>
        </div>
    </div>
</div>

    // ===== AUTO-CONVERT JSON-LD TO ARTICLES =====
    function typeLabel(type) {
        const map = {
            'SoftwareApplication': 'Software / App',
            'MobileApplication':   'Mobile App',
            'Corporation':         'Corporation',
            'Organization':        'Organization',
            'EducationalOrganization': 'Educational Org',
            'BankOrCreditUnion':   'Bank',
            'NewsMediaOrganization':'News Organization',
            'Country':             'Country',
            'Person':              'Person',
            'Question':            'Q&A'
        };
        return map[type] || type;
    }

    function buildRowsFromEntity(e) {
        const rows = [];
        const skip = new Set(['@id','@type','name','aliases','about','description','notes','hasPart']);
        const labels = {
            full_name:'Full Name', founder:'Founder', owner:'Owner', created:'Created',
            total_company:'Total Companies', network:'Network', location:'Location',
            capital:'Capital', continent:'Continent', member:'Members',
            leader:'Leader', headquarter:'Headquarter', under:'Under',
            full_form:'Full Form', first_game:'First Game', second_game:'Second Game',
            student_created:'Students Created', total_apps:'Total Apps',
            category:'Category', jobTitle:'Job Title'
        };
        for (const [k, v] of Object.entries(e)) {
            if (skip.has(k)) continue;
            if (typeof v === 'object' && !Array.isArray(v)) continue;
            const label = labels[k] || k.charAt(0).toUpperCase() + k.slice(1).replace(/_/g,' ');
            const value = Array.isArray(v) ? v.join(', ') : String(v);
            rows.push({ label, value });
        }
        // hasPart special
        if (e.hasPart) rows.push({ label: 'Companies', value: e.hasPart.join(', ') });
        return rows;
    }

    function convertJsonLdToArticles(data) {
        const articles = [];
        for (const entity of data['@graph']) {
            const type = entity['@type'];
            let id, title, subtitle, notes;

            if (type === 'Question') {
                id       = entity['@id'].split('/').pop();
                title    = entity['name'];
                subtitle = 'Question & Answer';
                notes    = entity['acceptedAnswer'] ? entity['acceptedAnswer']['text'] : '';
                articles.push({ id, title, subtitle, images: [], caption: '', notes, rows: [] });
                continue;
            }

            id       = entity['@id'].split('/').pop();
            title    = entity['name'];
            subtitle = typeLabel(type);
            notes    = entity['about'] || entity['description'] || '';
            const rows = buildRowsFromEntity(entity);
            articles.push({ id, title, subtitle, images: [], caption: '', notes, rows });
        }
        return articles;
    }

    mainSearchInput.addEventListener('input', function () {
        const raw   = this.value.trim();
        const clean = raw.toLowerCase();

        if (clean === 'edit') {
            isEditStateActive = !isEditStateActive;
            secretAdminBar.style.display = isEditStateActive ? 'flex' : 'none';
            if (isEditStateActive && selectedItem) {
                photoUploadTrigger.style.display = 'block';
                bottomActionRow.classList.add('visible');
                deleteArticleBtn.style.display = 'block';
            }
            alert(isEditStateActive ? "⚡ EDIT MODE ACTIVE!" : "🔒 EDIT MODE OFF");
            this.value = '';
            dropdownSuggestions.style.display = 'none';
            if (selectedItem) triggerCardDisplay(selectedItem.id);
            return;
        }

        dropdownSuggestions.innerHTML = '';
        if (raw === '') { dropdownSuggestions.style.display = 'none'; return; }

        const filtered = localDatabase.filter(d =>
            d.title.toLowerCase().includes(clean) || d.subtitle.toLowerCase().includes(clean)
        );

        if (filtered.length > 0) {
            filtered.forEach(data => {
                const div = document.createElement('div');
                div.className = 'box-row-item';
                div.innerHTML = `
                    <img src="${(data.images && data.images[0]) || ''}" class="row-thumb-frame">
                    <div class="row-text-meta"><h4>${data.title}</h4><p>${data.subtitle}</p></div>`;
                div.onclick = () => triggerCardDisplay(data.id);
                dropdownSuggestions.appendChild(div);
            });
            dropdownSuggestions.style.display = 'block';
        } else {
            dropdownSuggestions.style.display = 'none';
        }
    });

    mainSearchInput.addEventListener('click', function () {
        if (this.value.trim()) dropdownSuggestions.style.display = 'block';
    });

    // RENDER CARD
    function triggerCardDisplay(id) {
        const obj = localDatabase.find(i => i.id === id);
        if (!obj) return;
        if (!obj.images) { obj.images = obj.image ? [obj.image] : []; delete obj.image; }

        selectedItem      = obj;
        currentPhotoIndex = 0;

        searchView.style.display        = 'none';
        navHeader.style.display         = 'block';
        detailInfocardView.style.display= 'block';
        photoUploadTrigger.style.display= isEditStateActive ? 'block' : 'none';
        deleteArticleBtn.style.display  = isEditStateActive ? 'block' : 'none';

        if (isEditStateActive) bottomActionRow.classList.add('visible');
        else bottomActionRow.classList.remove('visible');

        const titleEl = document.getElementById('cardTitleHolder');
        const capEl   = document.getElementById('cardCaptionHolder');
        titleEl.innerText       = obj.title;
        titleEl.contentEditable = isEditStateActive;
        capEl.innerText         = obj.caption || '';
        capEl.contentEditable   = isEditStateActive;

        // Description row — show if notes exist, hide if empty
        renderDescriptionRow();
        renderCarousel();
        renderDataRows();
    }

    // DESCRIPTION TOGGLE
    function renderDescriptionRow() {
        const descRow      = document.getElementById('descRow');
        const descTextarea = document.getElementById('descTextarea');
        const addDescBtn   = document.getElementById('addDescBtn');
        const hasNotes     = selectedItem.notes && selectedItem.notes.trim() !== '';

        descTextarea.innerText       = selectedItem.notes || '';
        descTextarea.contentEditable = isEditStateActive;

        if (hasNotes) {
            // Always show desc row if notes exist
            descRow.classList.add('visible');
            if (addDescBtn) addDescBtn.style.display = 'none';
        } else {
            descRow.classList.remove('visible');
            // Show "Add Description" button only in edit mode
            if (addDescBtn) addDescBtn.style.display = isEditStateActive ? '' : 'none';
        }
    }

    function toggleDescription() {
        const descRow      = document.getElementById('descRow');
        const descTextarea = document.getElementById('descTextarea');
        const addDescBtn   = document.getElementById('addDescBtn');
        descRow.classList.add('visible');
        descTextarea.contentEditable = 'true';
        descTextarea.focus();
        if (addDescBtn) addDescBtn.style.display = 'none';
    }

    // CAROUSEL
    function renderCarousel() {
        if (!selectedItem) return;
        const imgs   = selectedItem.images || [];
        const imgEl  = document.getElementById('cardImageHolder');
        const dotsEl = document.getElementById('carouselDots');
        const arrowL = document.getElementById('arrowLeft');
        const arrowR = document.getElementById('arrowRight');

        if (currentPhotoIndex >= imgs.length) currentPhotoIndex = Math.max(0, imgs.length - 1);
        imgEl.src = imgs.length > 0 ? imgs[currentPhotoIndex] : '';

        const multi = imgs.length > 1;
        arrowL.style.display = multi ? 'block' : 'none';
        arrowR.style.display = multi ? 'block' : 'none';

        dotsEl.innerHTML = '';
        imgs.forEach((_, i) => {
            const dot = document.createElement('button');
            dot.className = 'carousel-dot' + (i === currentPhotoIndex ? ' active' : '');
            dot.onclick = () => { currentPhotoIndex = i; renderCarousel(); };
            dotsEl.appendChild(dot);
        });
    }

    function carouselMove(dir) {
        if (!selectedItem || !selectedItem.images) return;
        const len = selectedItem.images.length;
        if (len <= 1) return;
        currentPhotoIndex = (currentPhotoIndex + dir + len) % len;
        renderCarousel();
    }

    // DATA ROWS
    function renderDataRows() {
        const container = document.getElementById('cardRowsContainer');
        container.innerHTML = '';
        selectedItem.rows.forEach((row, index) => {
            const el = document.createElement('div');
            el.className = 'card-data-row';
            el.innerHTML = `
                <div class="card-cell-label" contenteditable="${isEditStateActive}" onblur="updateRowValue(${index},'label',this)">${row.label}</div>
                <div class="card-cell-value">
                    <span contenteditable="${isEditStateActive}" onblur="updateRowValue(${index},'value',this)">${row.value}</span>
                    <span class="delete-row-icon" style="display:${isEditStateActive ? 'block' : 'none'}" onclick="deleteSelectedRow(${index})">✕</span>
                </div>`;
            container.appendChild(el);
        });
    }

    function updateTextData(field, el) {
        if (selectedItem) { selectedItem[field] = el.innerText; syncStorage(); }
    }
    function updateRowValue(index, sub, el) {
        if (selectedItem && selectedItem.rows[index]) { selectedItem.rows[index][sub] = el.innerText; syncStorage(); }
    }
    function addNewInfoRow() {
        if (!selectedItem) return;
        selectedItem.rows.push({ label: "Label", value: "Value" });
        renderDataRows(); syncStorage();
    }
    function deleteSelectedRow(index) {
        if (!selectedItem) return;
        selectedItem.rows.splice(index, 1);
        renderDataRows(); syncStorage();
    }
    function deleteCurrentArticle() {
        if (!selectedItem) return;
        if (confirm(`"${selectedItem.title}" delete karna chahte hain?`)) {
            // Only manual articles can be deleted
            if (selectedItem.id.startsWith('manual_')) {
                manualArticles = manualArticles.filter(i => i.id !== selectedItem.id);
                localDatabase = [...jsonLdArticles, ...manualArticles];
            } else {
                alert("JSON-LD se aaye articles delete nahi ho sakte.");
                return;
            }
            resetToSearchView();
        }
    }

    // PHOTO UPLOAD
    function processLocalImage(event) {
        const files = Array.from(event.target.files);
        if (!files.length) return;
        if (!selectedItem) { alert("Pehle koi article open karo."); return; }
        if (!selectedItem.images) selectedItem.images = [];
        let loaded = 0;
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = e => {
                selectedItem.images.push(e.target.result);
                const db = localDatabase.find(i => i.id === selectedItem.id);
                if (db) db.images = selectedItem.images;
                loaded++;
                if (loaded === files.length) { currentPhotoIndex = selectedItem.images.length - 1; renderCarousel(); syncStorage(); }
            };
            reader.readAsDataURL(file);
        });
        event.target.value = '';
    }

    // CREATE MODAL
    function openCreateModal() {
        document.getElementById('mTitle').value    = '';
        document.getElementById('mSubtitle').value = '';
        document.getElementById('modalRowsContainer').innerHTML = `
            <div class="modal-row-entry">
                <input type="text" placeholder="Label" class="mRowLabel">
                <input type="text" placeholder="Value" class="mRowValue">
            </div>`;
        document.getElementById('createModal').classList.add('open');
    }
    function closeCreateModal() { document.getElementById('createModal').classList.remove('open'); }
    function addModalRow() {
        const rc  = document.getElementById('modalRowsContainer');
        const div = document.createElement('div');
        div.className = 'modal-row-entry';
        div.innerHTML = `<input type="text" placeholder="Label" class="mRowLabel"><input type="text" placeholder="Value" class="mRowValue">`;
        rc.appendChild(div);
    }
    function submitCreateArticle() {
        const title = document.getElementById('mTitle').value.trim();
        if (!title) { alert("Title zaroor likhein!"); return; }
        const subtitle = document.getElementById('mSubtitle').value.trim() || "Article";
        const labelEls = document.querySelectorAll('.mRowLabel');
        const valueEls = document.querySelectorAll('.mRowValue');
        const rows = [];
        labelEls.forEach((el, i) => {
            const l = el.value.trim(), v = valueEls[i] ? valueEls[i].value.trim() : '';
            if (l || v) rows.push({ label: l || "Label", value: v || "" });
        });
        const newArticle = {
            id: "manual_" + Date.now(), title, subtitle,
            images: [], caption: "", notes: "",
            rows: rows.length ? rows : []
        };
        manualArticles.push(newArticle);
        localDatabase = [...jsonLdArticles, ...manualArticles];
        closeCreateModal();
        triggerCardDisplay(newArticle.id);
    }

    function resetToSearchView() {
        detailInfocardView.style.display = 'none';
        navHeader.style.display          = 'none';
        searchView.style.display         = 'block';
        dropdownSuggestions.style.display= 'none';
        deleteArticleBtn.style.display   = 'none';
        mainSearchInput.value            = '';
        selectedItem = null;
    }

    // ===== DATA OVERVIEW =====
    function openDataOverview() {
        renderOverviewStats();
        renderOverviewList('');
        document.getElementById('overviewSearchInput').value = '';
        document.getElementById('dataOverviewModal').classList.add('open');
    }
    function closeDataOverview() {
        document.getElementById('dataOverviewModal').classList.remove('open');
    }

    function renderOverviewStats() {
        const total   = localDatabase.length;
        const jsonCnt = jsonLdArticles.length;
        const manCnt  = manualArticles.length;
        const infoCnt = infoCards.length;

        // Count by type
        const types = {};
        localDatabase.forEach(a => {
            const t = a._source || 'JSON';
            types[t] = (types[t] || 0) + 1;
        });

        const orgs    = jsonLdArticles.filter(a => a.subtitle === 'Organization' || a.subtitle === 'Corporation').length;
        const apps    = jsonLdArticles.filter(a => a.subtitle === 'Mobile App' || a.subtitle === 'Software / App').length;
        const countries = jsonLdArticles.filter(a => a.subtitle === 'Country').length;

        document.getElementById('overviewStats').innerHTML = `
            <span class="stat-badge">📦 Total: ${total + infoCnt}</span>
            <span class="stat-badge tag-json">JSON: ${jsonCnt}</span>
            <span class="stat-badge tag-manual">Manual: ${manCnt}</span>
            <span class="stat-badge tag-info">Info Cards: ${infoCnt}</span>
            <span class="stat-badge">🏢 Orgs: ${orgs}</span>
            <span class="stat-badge">📱 Apps: ${apps}</span>
            <span class="stat-badge">🌍 Countries: ${countries}</span>
        `;
    }

    function renderOverviewList(query) {
        const list = document.getElementById('overviewList');
        const q    = query.toLowerCase();

        // Combine all data sources
        const allItems = [
            ...localDatabase.map(a => ({ ...a, _src: a.id.startsWith('manual_') ? 'manual' : 'json' })),
            ...infoCards.map(c => ({ id: c.id, title: c.title, subtitle: 'Info Card', _src: 'info' }))
        ];

        const filtered = q ? allItems.filter(a => a.title.toLowerCase().includes(q) || (a.subtitle||'').toLowerCase().includes(q)) : allItems;

        if (filtered.length === 0) {
            list.innerHTML = '<div style="padding:16px;text-align:center;color:#777;font-size:13px;">Koi result nahi mila</div>';
            return;
        }

        list.innerHTML = '';
        filtered.forEach(item => {
            const div  = document.createElement('div');
            div.className = 'overview-item';

            const tagClass = item._src === 'json' ? 'tag-json' : item._src === 'manual' ? 'tag-manual' : 'tag-info';
            const tagLabel = item._src === 'json' ? 'JSON' : item._src === 'manual' ? 'Manual' : 'Info';
            const canDel   = item._src !== 'json';

            div.innerHTML = `
                <div class="overview-item-info">
                    <div class="overview-item-name">
                        ${item.title}
                        <span class="overview-source-tag ${tagClass}">${tagLabel}</span>
                    </div>
                    <div class="overview-item-type">${item.subtitle || ''}</div>
                </div>
                ${canDel ? `<button class="overview-item-del" onclick="deleteFromOverview('${item.id}','${item._src}',event)">🗑 Delete</button>` : ''}
            `;

            // Click to open article (not info cards for now)
            if (item._src !== 'info') {
                div.querySelector('.overview-item-info').onclick = () => {
                    closeDataOverview();
                    triggerCardDisplay(item.id);
                };
            }
            list.appendChild(div);
        });
    }

    function filterOverviewList(q) { renderOverviewList(q); }

    function deleteFromOverview(id, src, event) {
        event.stopPropagation();
        const name = localDatabase.find(a => a.id === id)?.title || infoCards.find(c => c.id === id)?.title || id;
        if (!confirm(`"${name}" delete karna chahte hain?`)) return;

        if (src === 'manual') {
            manualArticles = manualArticles.filter(a => a.id !== id);
            localDatabase  = [...jsonLdArticles, ...manualArticles];
            if (selectedItem && selectedItem.id === id) resetToSearchView();
        } else if (src === 'info') {
            infoCards = infoCards.filter(c => c.id !== id);
        }
        renderOverviewStats();
        renderOverviewList(document.getElementById('overviewSearchInput').value);
    }

    // ===== ADD INFORMATION (custom info card) =====
    let infoCards = [];
    let pendingInfoImg = null;

    function openAddInfoModal() {
        document.getElementById('infoCardTitle').value = '';
        document.getElementById('infoCardText').value  = '';
        document.getElementById('infoImgPreview').src  = '';
        document.getElementById('infoImgArea').classList.remove('has-img');
        pendingInfoImg = null;
        document.getElementById('addInfoModal').classList.add('open');
    }
    function closeAddInfoModal() {
        document.getElementById('addInfoModal').classList.remove('open');
    }

    function previewInfoImg(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            pendingInfoImg = e.target.result;
            document.getElementById('infoImgPreview').src = pendingInfoImg;
            document.getElementById('infoImgArea').classList.add('has-img');
        };
        reader.readAsDataURL(file);
        event.target.value = '';
    }

    function submitAddInfo() {
        const title = document.getElementById('infoCardTitle').value.trim();
        const text  = document.getElementById('infoCardText').value.trim();
        if (!title && !text) { alert("Title ya kuch text zaroor likhein!"); return; }

        // Save as info card AND as a searchable article
        const id = 'info_' + Date.now();
        const card = { id, title: title || 'Info Card', text, image: pendingInfoImg || null };
        infoCards.push(card);

        // Also add to manual articles so it shows in search
        const article = {
            id, title: title || 'Info Card', subtitle: 'Info Card',
            images: pendingInfoImg ? [pendingInfoImg] : [],
            caption: '', notes: text, rows: []
        };
        manualArticles.push(article);
        localDatabase = [...jsonLdArticles, ...manualArticles];

        closeAddInfoModal();
        triggerCardDisplay(id);
    }

    document.addEventListener('click', e => {
        if (!searchView.contains(e.target)) dropdownSuggestions.style.display = 'none';
    });
</script>
</body>
</html>
